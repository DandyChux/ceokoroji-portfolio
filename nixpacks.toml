providers = ["rust"]

[phases.setup]
nixPkgs = ["curl", "pkg-config", "openssl"]
nixLibs = ["gcc-unwrapped"]
aptPkgs = ["libstdc++6", "curl", "wget", "unzip"]

[phases.install_bun]
dependsOn = ["setup"]
cmds = [
    "curl -fsSL https://bun.sh/install | bash",
    "export PATH=\"$HOME/.bun/bin:$PATH\""
]

[phases.install]
dependsOn = ["install_bun"]
cmds = [
    "export PATH=\"$HOME/.bun/bin:$PATH\"",
    "curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -",
    "sudo apt-get install -y nodejs",
    "cd ui && bun install --frozen-lockfile",
    "cd ui && npm install --os=linux --cpu=x64 sharp"
]

[phases.build]
dependsOn = ["install"]
cmds = [
    "export PATH=\"$HOME/.bun/bin:$PATH\"",
    "cd ui && bun run build",
    "cargo build --release"
]

[start]
cmd = "./target/release/ceokoroji-api"
